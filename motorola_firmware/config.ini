[motorola_server]
base_url = https://motorola-firmware.example.com/api
guid =
jwt_token =
refresh_token =

[download]
output_directory = downloads
max_concurrent_downloads = 3
timeout = 30
chunk_size = 8192
max_retries = 3

[search]
default_limit = 20
default_region = global
include_beta = false

[logging]
level = INFO
log_file = motorola_firmware.log
log_dir = logs
max_size_mb = 5

[authentication]
auto_refresh = true
expiry_threshold_seconds = 300
