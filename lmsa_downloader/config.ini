; ============================================================
; LMSA Firmware Downloader — configuration
; ============================================================
; 
; STEP 1 — Capture fresh GUID and JWT from a live LMSA session:
;   1. Install HTTPToolkit  https://httptoolkit.com  (free)
;   2. Open HTTPToolkit and intercept "Software Fix" (LMSA).
;   3. In LMSA, open any device page to trigger an API call.
;   4. In HTTPToolkit, click any POST to lsa.lenovo.com and copy:
;        Request header "guid"          → paste as  guid  below
;        Request header "Authorization" → paste the Bearer token as  jwt
;      (drop the "Bearer " prefix from the jwt value)
;   5. Optionally copy the WUST from a lenovoIdLogin.jhtml request
;      body (dparams.wust) → paste as  wust  to enable auto JWT-refresh.
;
; STEP 2 — Set the URL file (download_links.txt from crawler output):
;   Under [urls], set  urls_file = /path/to/download_links.txt
;   The tool parses the curl commands and replaces the old JWT/GUID
;   with the fresh ones you pasted above.
;
; STEP 3 — Run:
;   pip install requests
;   python downloader.py
; ============================================================

[auth]
; ── Combined GUID:JWT format (easiest — paste from LMSA_JWT workflow input)
; lmsa_jwt = 3adf1304-8a70-4352-b687-8eddcef6b7d1:dcwyMSwoE07AHkME…

; ── Or set GUID and JWT separately ──────────────────────────
guid = PASTE_YOUR_GUID_HERE
jwt  = PASTE_YOUR_JWT_HERE

; ── WUST (optional) — enables automatic JWT refresh if it expires ─────
; Paste from the LMSA_WUST GitHub Actions workflow input, or capture
; from the dparams.wust field in a lenovoIdLogin.jhtml API call.
; wust = ZAgAAAAAAAGE9MTMwMDI4Nzc4Nzk0M…

; ── Advanced ─────────────────────────────────────────────────────────
; base_url   = https://lsa.lenovo.com/Interface
; verify_ssl = true

[settings]
; Directory where downloaded files are saved (relative to this config file)
output_dir = downloads

; Parallel download threads
workers = 4

; Retry count per file before giving up
retries = 3

; Resume partially downloaded files  (true/false)
resume = true

[urls]
; Path to the URL manifest file from the crawler.
; The tool supports all crawler output formats:
;
;   download_links.txt       — curl commands with embedded headers (BEST)
;                              The tool replaces old JWT/GUID with fresh ones.
;   lmsa_firmware_urls.txt   — tab-separated URL<TAB>filename list
;   lmsa_rom_urls.txt        — ROM / OTA firmware only
;   lmsa_tool_urls.txt       — flash-tool archives only
;
; Path is relative to this config.ini file.
urls_file = download_links.txt

; You can also add individual URLs directly:
; url_1 = https://rsddownload-secure.lenovo.com/fastboot_lamuc_g_…zip
; url_2 = https://download.lenovo.com/lsa/Rescue/…zip
