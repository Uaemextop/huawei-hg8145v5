[motorola_server]
base_url = https://api.motorola.example.com
guid = YOUR-GUID-HERE
jwt_token = YOUR-JWT-TOKEN
refresh_token = YOUR-REFRESH-TOKEN

[download]
output_directory = downloads
max_concurrent_downloads = 3
timeout_seconds = 30
chunk_size = 8192

[search]
default_limit = 25
filters = 
region = us
cache_ttl_seconds = 300

[logging]
level = INFO
log_file = logs/motorola_downloader.log
max_bytes = 1048576
backup_count = 5

[authentication]
auto_refresh = true
expiry_threshold_seconds = 300
token_expires_at = 
