[motorola_server]
# GUID: Device unique identifier (UUID v4 format)
# Generate with: python -c "import uuid; print(uuid.uuid4())"
# Example: 98e2895b-2e0a-4830-b5fe-eab0ab2c3f84
# REQUIRED: Must be set before authentication
guid = 00000000-0000-0000-0000-000000000000

# JWT Token: Authentication token from Motorola/LMSA servers
# Obtained automatically after calling authenticate().
# Rotates on every API response (server echoes Guid + new Authorization).
# Can also be set manually from a HAR/proxy capture.
jwt_token =

# Refresh Token: Used to renew expired JWT tokens
# Obtained during initial authentication flow.
refresh_token =

# LMSA desktop client version (from Software Fix.exe, confirmed via HAR)
client_version = 7.5.4.2

# Language BCP-47 tag sent in every request model
language = en-US

# OS description sent in every request model
windows_info = Microsoft Windows 11 Pro, x64-based PC

[download]
# Output directory for downloaded firmware files
output_directory = downloads

# Maximum number of concurrent downloads (1-5)
max_concurrent_downloads = 3

# Download chunk size in bytes
chunk_size = 8192

# Request timeout in seconds
timeout = 60

# Maximum retry attempts for failed downloads
max_retries = 3

[search]
# Default number of results per search
default_limit = 50

# Default search region
default_region = US

# Whether to include beta firmware versions
include_beta = false

# Enable search result caching
cache_enabled = true

# Cache time-to-live in seconds
cache_ttl_seconds = 300

[logging]
# Logging level: DEBUG, INFO, WARNING, ERROR, CRITICAL
level = INFO

# Log file path (relative or absolute)
log_file = logs/motorola_downloader.log

# Maximum log file size in megabytes before rotation
max_file_size_mb = 5

# Number of rotated log files to keep
backup_count = 5

[authentication]
# Automatically refresh tokens before expiration
auto_refresh = true

# Seconds before expiration to trigger auto-refresh
expiration_threshold_seconds = 300

# Maximum authentication retry attempts
max_auth_retries = 3
