[motorola_server]
guid = 00000000-0000-0000-0000-000000000000
jwt_token =
refresh_token = 
client_version = 7.5.4.2
language = en-US
windows_info = Microsoft Windows 11 Pro, x64-based PC

[download]
output_directory = downloads
max_concurrent_downloads = 3
chunk_size = 8192
timeout = 60
max_retries = 3

[search]
default_limit = 50
default_region = US
include_beta = false
cache_enabled = true
cache_ttl_seconds = 300

[logging]
level = INFO
log_file = logs/motorola_downloader.log
max_file_size_mb = 5
backup_count = 5

[authentication]
auto_refresh = true
expiration_threshold_seconds = 300
max_auth_retries = 3

