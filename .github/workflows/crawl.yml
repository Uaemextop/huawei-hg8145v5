name: Web Crawler

on:
  workflow_dispatch:
    inputs:
      url:
        description: "URL to crawl (e.g. https://rsddownload-secure.lenovo.com)"
        required: true
        type: string
      depth:
        description: "Maximum crawl depth (0 = unlimited)"
        required: false
        default: "0"
        type: string
      delay:
        description: "Delay between requests in seconds (e.g. 0.25)"
        required: false
        default: "0.25"
        type: string
      concurrency:
        description: "Parallel download workers ('auto' = CPU/RAM-based, or a number)"
        required: false
        default: "auto"
        type: string
      download_extensions:
        description: "Extensions to actively seek and queue (comma-separated: zip,exe,rar,bin,7z,apk or 'all' to download every discovered file)."
        required: false
        default: "zip,exe,rar,bin,7z,apk,jar,msi,img,iso,deb,rpm"
        type: string
      no_verify_ssl:
        description: "Disable TLS certificate verification"
        required: false
        default: true
        type: boolean
      allow_external_urls:
        description: "Download files from external CDN hosts discovered in crawled pages"
        required: false
        default: true
        type: boolean
      create_repo:
        description: "Create a new GitHub repository and push crawled files there live"
        required: false
        default: true
        type: boolean
      repo_owner:
        description: "GitHub user or org for the new repository (required when create_repo=true)"
        required: false
        default: "Uaemextop"
        type: string
      private_repo:
        description: "Create the crawl repository as private"
        required: false
        default: false
        type: boolean
      git_push_every:
        description: "Push every N saved files to the live repo (0 = only push at end)"
        required: false
        default: "100"
        type: string
      upload_extensions:
        description: "Extensions to include in git pushes (comma-separated: zip,bin,rar) or 'all' to upload every file."
        required: false
        default: "all"
        type: string
      debug:
        description: "Verbose logging + save HTTP response headers (.headers files) to repo"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  crawl:
    name: "Crawl ${{ inputs.url }}"
    runs-on: aapt2

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          # curl_cffi – TLS fingerprint spoofing for Cloudflare bypass
          pip install curl_cffi
          # Playwright – headless browser fallback for CF/CAPTCHA bypass
          pip install playwright
          python -m playwright install chromium firefox || true
          # Git LFS – for large binary files
          git lfs install

      - name: Generate normalized repo name
        id: reponame
        run: |
          python3 -c "
          import re, sys
          url = sys.argv[1]
          name = re.sub(r'^https?://', '', url)
          name = re.sub(r'[^a-zA-Z0-9]+', '-', name)
          name = name.strip('-').lower()[:100]
          print(f'name={name}')
          " "${{ inputs.url }}" >> "$GITHUB_OUTPUT"

      - name: Create repository for live progress
        if: inputs.create_repo == true
        id: create_repo
        env:
          ONT_TOKEN: ${{ secrets.ONT }}
        run: |
          set -euo pipefail

          REPO_BASE="${{ steps.reponame.outputs.name }}"
          OWNER="${{ inputs.repo_owner }}"

          if [ -z "$OWNER" ]; then
            RESP=$(curl -sS -w "\n%{http_code}" -H "Authorization: token $ONT_TOKEN" \
              https://api.github.com/user)
            HTTP_CODE=$(echo "$RESP" | tail -1)
            BODY=$(echo "$RESP" | sed '$d')
            if [ "$HTTP_CODE" != "200" ]; then
              echo "::error::Failed to get user info (HTTP $HTTP_CODE): $BODY"
              exit 1
            fi
            OWNER=$(echo "$BODY" | python3 -c "import sys,json; print(json.load(sys.stdin)['login'])")
          fi

          echo "Target owner: $OWNER"

          REPO_NAME="$REPO_BASE"
          COPY=0
          MAX_COPIES=50
          while true; do
            HTTP_CODE=$(curl -sS -o /dev/null -w "%{http_code}" \
              -H "Authorization: token $ONT_TOKEN" \
              "https://api.github.com/repos/${OWNER}/${REPO_NAME}")
            if [ "$HTTP_CODE" = "404" ]; then
              break
            elif [ "$HTTP_CODE" != "200" ]; then
              echo "::error::Unexpected response (HTTP $HTTP_CODE) checking repo ${OWNER}/${REPO_NAME}."
              exit 1
            fi
            COPY=$((COPY + 1))
            if [ "$COPY" -gt "$MAX_COPIES" ]; then
              echo "::error::Exceeded maximum of $MAX_COPIES name attempts."
              exit 1
            fi
            REPO_NAME="${REPO_BASE}-${COPY}"
            echo "Repo exists, trying: $REPO_NAME"
          done

          echo "Creating repository: ${OWNER}/${REPO_NAME}"

          RESP=$(curl -sS -w "\n%{http_code}" -H "Authorization: token $ONT_TOKEN" \
            "https://api.github.com/users/${OWNER}")
          HTTP_CODE=$(echo "$RESP" | tail -1)
          BODY=$(echo "$RESP" | sed '$d')
          OWNER_TYPE=$(echo "$BODY" | python3 -c "import sys,json; print(json.load(sys.stdin).get('type','User'))")

          if [ "$OWNER_TYPE" = "Organization" ]; then
            API_URL="https://api.github.com/orgs/${OWNER}/repos"
          else
            API_URL="https://api.github.com/user/repos"
          fi

          RESP=$(curl -sS -w "\n%{http_code}" -X POST \
            -H "Authorization: token $ONT_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "$API_URL" \
            -d "{
              \"name\": \"${REPO_NAME}\",
              \"description\": \"Crawled site: ${{ inputs.url }}\",
              \"private\": ${{ inputs.private_repo }},
              \"auto_init\": false
            }")
          HTTP_CODE=$(echo "$RESP" | tail -1)
          BODY=$(echo "$RESP" | sed '$d')
          if [ "$HTTP_CODE" != "201" ]; then
            echo "::error::Failed to create repository (HTTP $HTTP_CODE): $BODY"
            exit 1
          fi
          echo "✅ Repository created: ${OWNER}/${REPO_NAME}"

          mkdir -p downloaded_site
          cd downloaded_site
          git init -b main
          git lfs install --local
          git config lfs.locksverify false
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config credential.helper '!f() { echo "username=x-access-token"; echo "password=$ONT_TOKEN"; }; f'
          git remote add origin "https://x-access-token@github.com/${OWNER}/${REPO_NAME}.git"
          git config http.postBuffer 524288000

          cat > README.md <<EOF
          # Crawl of ${{ inputs.url }}

          | Setting | Value |
          |---------|-------|
          | Depth | ${{ inputs.depth }} |
          | Delay | ${{ inputs.delay }}s |
          | Download extensions | ${{ inputs.download_extensions }} |
          | Upload extensions | ${{ inputs.upload_extensions }} |
          | Concurrency | ${{ inputs.concurrency }} workers |
          | Git push every | ${{ inputs.git_push_every }} files |
          | Debug | ${{ inputs.debug }} |
          | Run | #${{ github.run_number }} |
          | Status | 🔄 Crawling in progress… |
          EOF
          git add -A
          git commit -m "Initial commit – crawl starting"
          git -c lfs.locksverify=false push -u origin main

          echo "repo_ready=true" >> "$GITHUB_OUTPUT"
          echo "repo_full=${OWNER}/${REPO_NAME}" >> "$GITHUB_OUTPUT"

      - name: Run web crawler
        env:
          ONT_TOKEN:       ${{ secrets.ONT }}
        run: |
          # Re-apply git credentials if repo was created
          if [ "${{ steps.create_repo.outputs.repo_ready }}" = "true" ]; then
            cd downloaded_site
            git config credential.helper '!f() { echo "username=x-access-token"; echo "password=$ONT_TOKEN"; }; f'
            cd ..
          fi

          echo "🔍 Crawling ${{ inputs.url }}"
          echo "   depth=${{ inputs.depth }}  delay=${{ inputs.delay }}  concurrency=${{ inputs.concurrency }}"
          echo "   download extensions: ${{ inputs.download_extensions }}"

          # ── Build Python arguments ──────────────────────────────────────
          GIT_ARGS=""
          if [ "${{ steps.create_repo.outputs.repo_ready }}" = "true" ] && \
             [ "${{ inputs.git_push_every }}" != "0" ]; then
            GIT_ARGS="git_repo_dir='downloaded_site', git_push_every=${{ inputs.git_push_every }},"
          fi

          VERIFY_SSL="True"
          [ "${{ inputs.no_verify_ssl }}" = "true" ] && VERIFY_SSL="False"

          ALLOW_EXT="True"
          [ "${{ inputs.allow_external_urls }}" = "false" ] && ALLOW_EXT="False"

          python3 -c "
          from crawl4ai.extensions.downloader import SiteDownloader

          exts = '${{ inputs.download_extensions }}'.split(',')
          exts = {e.strip() for e in exts if e.strip()}
          if 'all' in exts:
              exts = {'all'}

          dl = SiteDownloader(
              url='${{ inputs.url }}',
              output_dir='downloaded_site',
              max_depth=int('${{ inputs.depth }}') if int('${{ inputs.depth }}') > 0 else 2,
              download_extensions=exts or None,
              delay=float('${{ inputs.delay }}'),
              concurrency=int('${{ inputs.concurrency }}') if '${{ inputs.concurrency }}' != 'auto' else 0,
              verify_ssl=${VERIFY_SSL},
              allow_external=${ALLOW_EXT},
              ${GIT_ARGS}
          )
          result = dl.run()
          print(f'Result: {result}')
          "

      - name: Show download summary
        if: always()
        run: |
          echo "📊 Download Summary"
          echo "==================="
          if [ -d downloaded_site ]; then
            echo "Total files: $(find downloaded_site -type f -not -path '*/\.git/*' -not -name '*.headers' | wc -l)"
            echo ""
            echo "Files by extension:"
            find downloaded_site -type f -not -path '*/\.git/*' -not -name '*.headers' \
              | awk -F. '{if (NF>1) print $NF; else print "(no ext)"}' | sort | uniq -c | sort -rn | head -20
            echo ""
            if [ -f downloaded_site/download_links.txt ]; then
              LINK_COUNT=$(grep -c '^curl ' downloaded_site/download_links.txt 2>/dev/null || echo 0)
              echo "🔗 download_links.txt: $LINK_COUNT ready-to-run curl commands"
            fi
            echo ""
            echo "Binary/firmware files:"
            find downloaded_site -type f -not -path '*/\.git/*' \
              \( -name '*.zip' -o -name '*.rar' -o -name '*.bin' -o -name '*.7z' \
                 -o -name '*.exe' -o -name '*.apk' -o -name '*.img' -o -name '*.iso' \) \
              -exec echo "  {}" \; 2>/dev/null | head -50 || echo "  (none found)"
          else
            echo "No downloaded files found."
          fi

      - name: Final push of remaining files
        if: inputs.create_repo == true && steps.create_repo.outputs.repo_ready == 'true'
        env:
          ONT_TOKEN: ${{ secrets.ONT }}
        run: |
          cd downloaded_site
          git config credential.helper '!f() { echo "username=x-access-token"; echo "password=$ONT_TOKEN"; }; f'

          LARGE_FILES=$(find . -not -path './.git/*' -type f -size +50M 2>/dev/null)
          if [ -n "$LARGE_FILES" ]; then
            echo "📦 Tracking large files (>50 MB) with Git LFS:"
            echo "$LARGE_FILES" | while IFS= read -r f; do
              SIZE_MB=$(du -m "$f" | cut -f1)
              echo "  ${f} (${SIZE_MB} MB)"
              git lfs track "$f"
            done
            git add .gitattributes
          fi

          sed -i 's/🔄 Crawling in progress…/✅ Crawl complete/' README.md
          git add README.md

          UPLOAD_EXTS="${{ inputs.upload_extensions }}"
          if [ "$UPLOAD_EXTS" != "all" ] && [ -n "$UPLOAD_EXTS" ]; then
            echo "Filtering upload to extensions: $UPLOAD_EXTS"
            IFS=',' read -ra EXT_ARRAY <<< "$UPLOAD_EXTS"
            FIND_ARGS=()
            for ext in "${EXT_ARRAY[@]}"; do
              ext=$(echo "$ext" | xargs)
              ext="${ext#.}"
              [ ${#FIND_ARGS[@]} -gt 0 ] && FIND_ARGS+=("-o")
              FIND_ARGS+=("-iname" "*.${ext}")
              [ "${{ inputs.debug }}" = "true" ] && FIND_ARGS+=("-o" "-iname" "*.${ext}.headers")
            done
            # Always include manifest/link files
            FIND_ARGS+=("-o" "-name" "download_links.txt")
            find . -not -path './.git/*' \( "${FIND_ARGS[@]}" \) -exec git add {} + 2>/dev/null || true
          else
            if [ "${{ inputs.debug }}" = "true" ]; then
              git add -A
            else
              find . -not -path './.git/*' -not -name '*.headers' -type f -exec git add {} + 2>/dev/null || true
            fi
          fi

          git diff --cached --quiet || git commit -m "Crawl complete: ${{ inputs.url }}"
          git -c lfs.locksverify=false push

      - name: Zip downloaded site
        run: |
          cd downloaded_site
          zip -r ../crawl-${{ steps.reponame.outputs.name }}.zip . -x '.git/*' -x '.git'

      - name: Zip video files only
        run: |
          cd downloaded_site
          find . -not -path './.git/*' -type f \( \
            -iname '*.mp4' -o -iname '*.webm' -o -iname '*.ogv' \
            -o -iname '*.avi' -o -iname '*.mov' -o -iname '*.flv' \
            -o -iname '*.mkv' -o -iname '*.wmv' -o -iname '*.m4v' \
            -o -iname '*.3gp' -o -iname '*.3g2' -o -iname '*.ts' \
            -o -iname '*.mpeg' -o -iname '*.mpg' -o -iname '*.f4v' \
            -o -iname '*.asf' \) -print > /tmp/video_files.txt
          if [ -s /tmp/video_files.txt ]; then
            zip ../videos-${{ steps.reponame.outputs.name }}.zip -@ < /tmp/video_files.txt
            echo "📹 Video zip created with $(wc -l < /tmp/video_files.txt) file(s)"
          else
            echo "📹 No video files found – skipping video zip"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: "crawl-${{ steps.reponame.outputs.name }}"
          path: downloaded_site/
          retention-days: 90

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "crawl-${{ steps.reponame.outputs.name }}-${{ github.run_number }}"
          name: "Crawl ${{ inputs.url }} (#${{ github.run_number }})"
          body: |
            ## Web Crawl Results

            | Setting | Value |
            |---------|-------|
            | **URL** | ${{ inputs.url }} |
            | **Depth** | ${{ inputs.depth }} |
            | **Delay** | ${{ inputs.delay }}s |
            | **SSL verification disabled** | ${{ inputs.no_verify_ssl }} |
            | **Download extensions** | ${{ inputs.download_extensions }} |
            | **Upload extensions** | ${{ inputs.upload_extensions }} |
            | **Concurrency** | ${{ inputs.concurrency }} workers |
            | **Allow external URLs** | ${{ inputs.allow_external_urls }} |
            | **Git push every** | ${{ inputs.git_push_every }} files |
            | **Debug mode** | ${{ inputs.debug }} |
            | **Run** | #${{ github.run_number }} |
            ${{ steps.create_repo.outputs.repo_ready == 'true' && format('| **Live repo** | https://github.com/{0} |', steps.create_repo.outputs.repo_full) || '' }}

            ### Notes
            - `download_summary.md` — table of all downloaded files with sizes
          files: |
            crawl-${{ steps.reponame.outputs.name }}.zip
            videos-${{ steps.reponame.outputs.name }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
