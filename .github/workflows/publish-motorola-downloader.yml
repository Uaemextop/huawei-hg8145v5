name: Publish Motorola Downloader

on:
  workflow_dispatch:
    inputs:
      repo_visibility:
        description: 'Repository visibility'
        required: true
        default: 'public'
        type: choice
        options:
          - public
          - private

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      TARGET_REPO: motorola-firmware-downloader

    steps:
      - name: Checkout source repository
        uses: actions/checkout@v4

      - name: Create target repository
        env:
          GH_TOKEN: ${{ secrets.REPO_PAT }}
        run: |
          # Check if repository already exists
          if gh repo view "${{ github.repository_owner }}/${{ env.TARGET_REPO }}" &>/dev/null; then
            echo "Repository ${{ env.TARGET_REPO }} already exists, skipping creation."
          else
            gh repo create "${{ github.repository_owner }}/${{ env.TARGET_REPO }}" \
              --${{ inputs.repo_visibility }} \
              --description "Motorola Firmware Downloader — search, authenticate & download Motorola firmware, ROMs and tools" \
              --clone=false
            echo "Repository ${{ env.TARGET_REPO }} created."
          fi

      - name: Push motorola_downloader content
        env:
          GH_TOKEN: ${{ secrets.REPO_PAT }}
        run: |
          set -e

          # Prepare a temporary directory with the package content
          WORK_DIR=$(mktemp -d)
          cp -r motorola_downloader/. "$WORK_DIR/"

          # Copy top-level files relevant to the package
          [ -f requirements.txt ] && cp requirements.txt "$WORK_DIR/"
          [ -f setup.py ]         && cp setup.py "$WORK_DIR/"
          [ -f README.md ]        && cp README.md "$WORK_DIR/"

          # Create a .gitignore for the new repo
          cat > "$WORK_DIR/.gitignore" <<'EOF'
          __pycache__/
          *.pyc
          *.pyo
          *.egg-info/
          dist/
          build/
          .eggs/
          logs/
          downloads/
          *.log
          *.key
          config.local.ini
          EOF
          # Remove leading whitespace added by heredoc indentation
          sed -i 's/^[[:space:]]*//' "$WORK_DIR/.gitignore"

          # Initialize and push
          cd "$WORK_DIR"
          git init -b main
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Initial commit: Motorola Firmware Downloader (source: ${{ github.repository }}@${{ github.sha }})"

          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository_owner }}/${{ env.TARGET_REPO }}.git"
          git push -u origin main --force

          echo "✅ Published to https://github.com/${{ github.repository_owner }}/${{ env.TARGET_REPO }}"
